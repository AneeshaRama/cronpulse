name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cronpulse
          POSTGRES_PASSWORD: cronpulse
          POSTGRES_DB: cronpulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cronpulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          AUTH_SECRET: ci-test-secret
          CRON_SECRET: ci-test-cron-secret

      - name: Run tests
        run: bun run test
        env:
          TEST_DATABASE_URL: postgresql://cronpulse:cronpulse@localhost:5432/cronpulse_test
