services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cronpulse
      POSTGRES_PASSWORD: cronpulse
      POSTGRES_DB: cronpulse
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cronpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cronpulse:cronpulse@db:5432/cronpulse
      AUTH_SECRET: ${AUTH_SECRET:-change-me-generate-with-openssl-rand-base64-33}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET}
      CRON_SECRET: ${CRON_SECRET:-change-me-random-string}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY:-}

volumes:
  pgdata:
